<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conversor de Bases</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --danger: #fb7185;
      --border: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1e3a8a 0, var(--bg) 38%, #020617 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 980px;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.38);
      overflow: hidden;
    }

    header {
      padding: 28px 32px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(56,189,248,0.16), rgba(34,197,94,0.08));
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: -0.03em;
    }

    header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 24px;
    }

    .panel {
      background: rgba(31, 41, 55, 0.72);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
    }

    .panel.full { grid-column: 1 / -1; }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f9fafb;
    }

    input, select, button, textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      padding: 13px 14px;
      font-size: 1rem;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 16px;
    }

    .help {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 7px;
      line-height: 1.4;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      cursor: pointer;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #2563eb);
      border: none;
      transition: transform .12s ease, opacity .12s ease;
    }

    button:hover { transform: translateY(-1px); }
    button.secondary { background: #334155; }
    button.copy { background: linear-gradient(135deg, var(--accent-2), #15803d); }

    .result-box {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      min-height: 160px;
    }

    .result-title {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .result-value {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 900;
      overflow-wrap: anywhere;
      color: #f8fafc;
    }

    .conversion-line {
      margin-top: 14px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .error {
      color: var(--danger);
      font-weight: 700;
      margin-top: 14px;
    }

    textarea {
      min-height: 260px;
      resize: vertical;
      font-family: Consolas, Monaco, monospace;
      line-height: 1.5;
      white-space: pre;
    }

    .switch-line {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
    }

    .switch-line input {
      width: auto;
      accent-color: var(--accent);
    }

    @media (max-width: 780px) {
      main { grid-template-columns: 1fr; }
      .row, .actions { grid-template-columns: 1fr; }
      header, main { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Conversor de Bases Numéricas</h1>
    </header>

    <main>
      <section class="panel">
        <label for="numero">Número a converter</label>
        <input id="numero" type="text" placeholder="Ex.: 1011.01, 17, 1A3, 7.4" value="1A3" />
        <div class="help">Aceita ponto ou vírgula como separador decimal. Para hexadecimal, use A–F.</div>

        <div class="row">
          <div>
            <label for="baseOrigem">Base de origem</label>
            <select id="baseOrigem">
              <option value="2">Binário (base 2)</option>
              <option value="8">Octal (base 8)</option>
              <option value="10">Decimal (base 10)</option>
              <option value="16" selected>Hexadecimal (base 16)</option>
            </select>
          </div>
          <div>
            <label for="baseDestino">Base de destino</label>
            <select id="baseDestino">
              <option value="2">Binário (base 2)</option>
              <option value="8">Octal (base 8)</option>
              <option value="10" selected>Decimal (base 10)</option>
              <option value="16">Hexadecimal (base 16)</option>
            </select>
          </div>
        </div>

        <div class="switch-line">
          <input id="mostrarPassos" type="checkbox" checked />
          <span>Mostrar passo a passo</span>
        </div>

        <div class="actions">
          <button onclick="converterInterface()">Converter</button>
          <button class="secondary" onclick="limpar()">Limpar</button>
        </div>
      </section>

      <section class="panel">
        <div class="result-box">
          <div class="result-title">Resultado</div>
          <div id="resultado" class="result-value">419</div>
          <div id="linhaConversao" class="conversion-line">1A3 [base 16] → 419 [base 10]</div>
          <div id="erro" class="error"></div>
        </div>

        <div class="actions">
          <button class="copy" onclick="copiarResultado()">Copiar resultado</button>
          <button class="secondary" onclick="inverterBases()">Inverter bases</button>
        </div>
      </section>

      <section class="panel full">
        <label for="passos">Passo a passo</label>
        <textarea id="passos" readonly></textarea>
      </section>
    </main>
  </div>

  <script>
    const DIGITOS = "0123456789ABCDEF";

    function nomeBase(base) {
      const nomes = {
        2: "Binário (base 2)",
        8: "Octal (base 8)",
        10: "Decimal (base 10)",
        16: "Hexadecimal (base 16)"
      };
      return nomes[base] || `Base ${base}`;
    }

    function charParaDigito(c) {
      return DIGITOS.indexOf(c.toUpperCase());
    }

    function digitoParaChar(d) {
      return DIGITOS[d];
    }

    function validarNumero(numero, base) {
      if (!numero || numero === "." || numero === "," || numero === "-" || numero === "-.") {
        return "Digite um número válido.";
      }

      let n = numero.replace(",", ".").toUpperCase();
      if (n.startsWith("-")) n = n.slice(1);

      let pontos = 0;
      for (const c of n) {
        if (c === ".") {
          pontos++;
          if (pontos > 1) return "O número possui mais de um separador decimal.";
          continue;
        }
        const valor = charParaDigito(c);
        if (valor < 0 || valor >= base) {
          return `O dígito "${c}" é inválido para a base ${base}.`;
        }
      }
      return "";
    }

    function separarNumero(numero) {
      let n = numero.trim().replace(",", ".").toUpperCase();
      const negativo = n.startsWith("-");
      if (negativo) n = n.slice(1);
      const partes = n.split(".");
      return {
        negativo,
        inteiro: partes[0] || "0",
        fracao: partes[1] || ""
      };
    }

    function paraDecimal(numero, base) {
      const { negativo, inteiro, fracao } = separarNumero(numero);
      let log = `Somatório posicional (base ${base} → 10):\n`;
      let resultado = 0;

      let expoente = inteiro.length - 1;
      for (const c of inteiro) {
        const d = charParaDigito(c);
        const parcela = d * Math.pow(base, expoente);
        log += `  ${c} × ${base}^${expoente} = ${parcela}\n`;
        resultado += parcela;
        expoente--;
      }

      let expFrac = -1;
      for (const c of fracao) {
        const d = charParaDigito(c);
        const parcela = d * Math.pow(base, expFrac);
        log += `  ${c} × ${base}^${expFrac} = ${parcela}\n`;
        resultado += parcela;
        expFrac--;
      }

      if (negativo) resultado *= -1;
      log += `  Total = ${resultado}\n`;
      return { valor: resultado, passos: log };
    }

    function decimalPara(numero, base, temFracao) {
      let log = `Divisões sucessivas (10 → base ${base}):\n`;
      const negativo = numero < 0;
      let valorAbs = Math.abs(numero);
      let parteInteira = Math.floor(valorAbs);
      let parteFracao = valorAbs - parteInteira;
      let resultado = "";

      if (parteInteira === 0) {
        resultado = "0";
        log += "  Parte inteira é 0.\n";
      } else {
        let restos = [];
        let n = parteInteira;
        while (n > 0) {
          const resto = n % base;
          log += `  ${n} / ${base} = ${Math.floor(n / base)}  resto ${resto} (${digitoParaChar(resto)})\n`;
          restos.push(digitoParaChar(resto));
          n = Math.floor(n / base);
        }
        resultado = restos.reverse().join("");
        log += `  Lendo os restos de baixo para cima: ${resultado}\n`;
      }

      if (temFracao && parteFracao > 0) {
        resultado += ".";
        log += "Multiplicações sucessivas da fração:\n";
        let casas = 0;
        while (parteFracao > 1e-14 && casas < 16) {
          const antes = parteFracao;
          parteFracao *= base;
          const digito = Math.floor(parteFracao);
          parteFracao -= digito;
          resultado += digitoParaChar(digito);
          log += `  ${antes} × ${base} = ${digitoParaChar(digito)} + ${parteFracao}\n`;
          casas++;
        }
        if (parteFracao > 1e-14) log += "  [TRUNCADO em 16 casas]\n";
      }

      if (negativo && resultado !== "0") resultado = "-" + resultado;
      return { valor: resultado, passos: log };
    }

    function agruparBinario(bin, tamanhoGrupo, baseDestino) {
      const { negativo, inteiro, fracao } = separarNumero(bin);
      let intPart = inteiro;
      let fracPart = fracao;
      let log = `Agrupamento de ${tamanhoGrupo} bits (base 2 → base ${baseDestino}):\n`;

      while (intPart.length % tamanhoGrupo !== 0) intPart = "0" + intPart;

      let resultado = "";
      for (let i = 0; i < intPart.length; i += tamanhoGrupo) {
        const grupo = intPart.slice(i, i + tamanhoGrupo);
        const valor = parseInt(grupo, 2);
        log += `  ${grupo} → ${digitoParaChar(valor)}\n`;
        resultado += digitoParaChar(valor);
      }

      if (fracPart.length > 0) {
        resultado += ".";
        while (fracPart.length % tamanhoGrupo !== 0) fracPart += "0";
        for (let i = 0; i < fracPart.length; i += tamanhoGrupo) {
          const grupo = fracPart.slice(i, i + tamanhoGrupo);
          const valor = parseInt(grupo, 2);
          log += `  ${grupo} → ${digitoParaChar(valor)}\n`;
          resultado += digitoParaChar(valor);
        }
      }

      resultado = removerZerosEsquerda(resultado);
      if (negativo && resultado !== "0") resultado = "-" + resultado;
      return { valor: resultado, passos: log };
    }

    function baseParaBinario(numero, baseOrigem, tamanhoGrupo) {
      const { negativo, inteiro, fracao } = separarNumero(numero);
      let log = `Cada dígito da base ${baseOrigem} → ${tamanhoGrupo} bits:\n`;
      let resultado = "";

      for (const c of inteiro) {
        const bin = charParaDigito(c).toString(2).padStart(tamanhoGrupo, "0");
        log += `  ${c} → ${bin}\n`;
        resultado += bin;
      }

      resultado = removerZerosEsquerda(resultado);

      if (fracao.length > 0) {
        resultado += ".";
        for (const c of fracao) {
          const bin = charParaDigito(c).toString(2).padStart(tamanhoGrupo, "0");
          log += `  ${c} → ${bin}\n`;
          resultado += bin;
        }
      }

      if (negativo && resultado !== "0") resultado = "-" + resultado;
      return { valor: resultado, passos: log };
    }

    function removerZerosEsquerda(valor) {
      const negativo = valor.startsWith("-");
      let v = negativo ? valor.slice(1) : valor;
      const partes = v.split(".");
      let inteiro = partes[0].replace(/^0+(?=\d)/, "");
      if (inteiro === "") inteiro = "0";
      const fracao = partes[1] !== undefined ? "." + partes[1] : "";
      return (negativo ? "-" : "") + inteiro + fracao;
    }

    function converter(numero, baseOrigem, baseDestino) {
      const temFracao = numero.includes(".") || numero.includes(",");
      let passos = "";

      if (baseOrigem === baseDestino) {
        return { valor: numero.replace(",", ".").toUpperCase(), passos: "Bases iguais, nenhuma conversão necessária.\n" };
      }

      let resultado;

      if (baseOrigem === 2 && baseDestino === 8) {
        resultado = agruparBinario(numero, 3, 8);
      } else if (baseOrigem === 8 && baseDestino === 2) {
        resultado = baseParaBinario(numero, 8, 3);
      } else if (baseOrigem === 2 && baseDestino === 16) {
        resultado = agruparBinario(numero, 4, 16);
      } else if (baseOrigem === 16 && baseDestino === 2) {
        resultado = baseParaBinario(numero, 16, 4);
      } else if (baseOrigem === 8 && baseDestino === 16) {
        const bin = baseParaBinario(numero, 8, 3);
        const hex = agruparBinario(bin.valor, 4, 16);
        resultado = { valor: hex.valor, passos: bin.passos + "\n" + hex.passos };
      } else if (baseOrigem === 16 && baseDestino === 8) {
        const bin = baseParaBinario(numero, 16, 4);
        const oct = agruparBinario(bin.valor, 3, 8);
        resultado = { valor: oct.valor, passos: bin.passos + "\n" + oct.passos };
      } else {
        const dec = paraDecimal(numero, baseOrigem);
        if (baseDestino === 10) {
          resultado = { valor: String(dec.valor), passos: dec.passos };
        } else {
          const conv = decimalPara(dec.valor, baseDestino, temFracao);
          resultado = { valor: conv.valor, passos: dec.passos + "\n" + conv.passos };
        }
      }

      resultado.valor = removerZerosEsquerda(resultado.valor);
      return resultado;
    }

    function converterInterface() {
      const numero = document.getElementById("numero").value.trim();
      const baseOrigem = Number(document.getElementById("baseOrigem").value);
      const baseDestino = Number(document.getElementById("baseDestino").value);
      const mostrarPassos = document.getElementById("mostrarPassos").checked;
      const erroEl = document.getElementById("erro");
      const resultadoEl = document.getElementById("resultado");
      const linhaEl = document.getElementById("linhaConversao");
      const passosEl = document.getElementById("passos");

      erroEl.textContent = "";
      passosEl.value = "";

      const erro = validarNumero(numero, baseOrigem);
      if (erro) {
        resultadoEl.textContent = "—";
        linhaEl.textContent = "Conversão não realizada.";
        erroEl.textContent = erro;
        return;
      }

      const res = converter(numero, baseOrigem, baseDestino);
      resultadoEl.textContent = res.valor;
      linhaEl.textContent = `${numero.toUpperCase().replace(",", ".")} [${nomeBase(baseOrigem)}] → ${res.valor} [${nomeBase(baseDestino)}]`;
      passosEl.value = mostrarPassos ? res.passos : "Passo a passo desativado.";
    }

    function limpar() {
      document.getElementById("numero").value = "";
      document.getElementById("resultado").textContent = "—";
      document.getElementById("linhaConversao").textContent = "Digite um número e clique em Converter.";
      document.getElementById("erro").textContent = "";
      document.getElementById("passos").value = "";
    }

    function inverterBases() {
      const origem = document.getElementById("baseOrigem");
      const destino = document.getElementById("baseDestino");
      const temp = origem.value;
      origem.value = destino.value;
      destino.value = temp;
      converterInterface();
    }

    async function copiarResultado() {
      const texto = document.getElementById("resultado").textContent;
      if (!texto || texto === "—") return;
      try {
        await navigator.clipboard.writeText(texto);
      } catch (e) {
        alert("Não foi possível copiar automaticamente. Resultado: " + texto);
      }
    }

    document.getElementById("numero").addEventListener("keydown", function(e) {
      if (e.key === "Enter") converterInterface();
    });

    converterInterface();
  </script>
</body>
</html>
